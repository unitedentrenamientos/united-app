  window.fbSet=function(k,v){

  window.fbListen=function(k,cb){
    if(!db)return function(){};
    return db.collection("store").doc(k).onSnapshot(
      function(s){if(s.exists)cb(s.data().value);},
      function(e){console.warn("listen err",e);}
    );
  };
})();
